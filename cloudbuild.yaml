steps:
  # ── Build image ─────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/traverz-bot:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/traverz-bot:latest'
      - '-f'
      - 'Dockerfile.traverz'
      - '.'

  # ── Push ─────────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/traverz-bot:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/traverz-bot:latest']

  # ── Deploy to Cloud Run ──────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'deploy'
      - 'traverz-bot'
      - '--image'
      - 'gcr.io/$PROJECT_ID/traverz-bot:$COMMIT_SHA'
      - '--region'
      - 'asia-southeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      # Cloud Run gen2 + fuse are required for gcsfuse
      - '--execution-environment'
      - 'gen2'
      - '--cpu'
      - '1'
      - '--memory'
      - '1Gi'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '300'
      - '--port'
      - '8765'
      # VPC connector (same as backend) for internal Redis / backend access
      - '--vpc-connector'
      - 'traverz-connector'
      - '--vpc-egress'
      - 'private-ranges-only'
      - '--set-env-vars'
      - 'TRAVERZ_BACKEND_URL=https://api.traverz.ai,TRAVERZ_GCS_BUCKET=traverz-bot-workspace'
      - '--set-secrets'
      - 'GEMINI_API_KEY=GEMINI_API_KEY:latest,WEBSOCKET_TOKEN_SECRET=WEBSOCKET_TOKEN_SECRET:latest'

images:
  - 'gcr.io/$PROJECT_ID/traverz-bot:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/traverz-bot:latest'

options:
  logging: CLOUD_LOGGING_ONLY
